<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Makima</title>

<style>
:root {
  --cream: #f5f1eb;
  --deep-red: #b11226;
  --dark: #111;
  --soft-gray: #444;
}

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: var(--cream);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* MAIN CONTAINER */
#app {
  width: 420px;
  height: 90vh;
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* INTRO */
#intro {
  flex: 1;
  background: var(--cream);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px;
  text-align: center;
}

#intro img {
  width: 160px;
  height: 160px;
  object-fit: cover;
  border-radius: 50%;
  border: 3px solid var(--deep-red);
  margin-bottom: 20px;
}

#intro h1 {
  margin: 0;
  font-size: 26px;
  color: var(--dark);
}

#intro p {
  font-size: 15px;
  color: var(--soft-gray);
  line-height: 1.6;
  margin: 15px 0 30px;
}

#start-btn {
  background: var(--deep-red);
  color: #fff;
  border: none;
  padding: 12px 30px;
  border-radius: 30px;
  font-size: 15px;
  cursor: pointer;
}

/* CHAT */
#chat {
  display: none;
  flex-direction: column;
  height: 100%;
}

#chat-header {
  background: var(--deep-red);
  color: #fff;
  padding: 15px;
  font-size: 18px;
  font-weight: 500;
}

#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  background: #fafafa;
}

.message {
  max-width: 75%;
  margin-bottom: 12px;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.5;
}

.user {
  background: var(--deep-red);
  color: #fff;
  margin-left: auto;
  border-bottom-right-radius: 5px;
}

.bot {
  background: #eaeaea;
  color: #000;
  border-bottom-left-radius: 5px;
}

/* INPUT */
#input-area {
  display: flex;
  padding: 10px;
  background: #fff;
  border-top: 1px solid #ddd;
}

#input {
  flex: 1;
  border: none;
  padding: 10px;
  font-size: 14px;
  outline: none;
}

#send {
  background: none;
  border: none;
  color: var(--deep-red);
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="app">

  <!-- INTRO -->
  <div id="intro">
    <img src="Makima.jfif" alt="Makima">
    <h1>Makima</h1>
    <p>
      I am Makima.<br>
      Calm. Observant. In control.<br><br>
      Speak honestly.<br>
      I will listen.
    </p>
    <button id="start-btn">Enter</button>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div id="chat-header">Makima</div>
    <div id="messages"></div>
    <div id="input-area">
      <input id="input" placeholder="Say something…" />
      <button id="send">➤</button>
    </div>
  </div>

</div>

<script>
  let sessionId = null;
  
  const intro = document.getElementById("intro");
  const chat = document.getElementById("chat");
  const startBtn = document.getElementById("start-btn");
  
  startBtn.onclick = () => {
    intro.style.display = "none";
    chat.style.display = "flex";
  };
  
  const messages = document.getElementById("messages");
  const input = document.getElementById("input");
  const send = document.getElementById("send");
  
  function addMessage(text, cls) {
    const div = document.createElement("div");
    div.className = "message " + cls;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }
  
  send.onclick = () => {
    const msg = input.value.trim();
    if (!msg) return;
  
    addMessage(msg, "user");
    input.value = "";
  
  fetch("https://makima-backend-production.up.railway.app/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: msg,
      session_id: sessionId
    })
  })
  .then(res => res.json())
  .then(data => {
    sessionId = data.session_id;
    addMessage(data.reply, "bot");
  })
  .catch(err => {
    addMessage("Makima is silent right now.", "bot");
  });

  };
  
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") send.onclick();
  });
  </script>
  
</body>
</html>
